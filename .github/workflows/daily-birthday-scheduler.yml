name: Daily Birthday Scheduler

on:
  schedule:
    - cron: '30 18 * * *' # 6:30 PM UTC / 12:00 AM Asia/Kolkata daily
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  trigger-scheduler:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Birthday Portal API
        run: |
          DOMAIN="${{ secrets.PORTAL_DOMAIN }}"
          # Fallback to default Vercel domain if secret is not set
          if [ -z "$DOMAIN" ]; then
            DOMAIN="nst-blr.vercel.app"
          fi
          
          # Automatically strip http://, https://, and trailing slashes if present in variable
          DOMAIN=$(echo "$DOMAIN" | sed -e 's|^https://||' -e 's|^http://||' -e 's|/$||')
          
          SECRET="${{ secrets.CRON_SECRET }}"
          
          echo "⚡ Triggering Daily Birthday checklist on: $DOMAIN"
          curl -f -s -X GET "https://$DOMAIN/api/cron/birthday?secret=$SECRET" \
            -H "Authorization: Bearer $SECRET"
          echo "✅ Trigger completed successfully!"
