<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Directory | SVYASA</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Password Protection Screen -->
    <div id="auth-screen" class="auth-screen">
        <div class="auth-container">
            <div class="auth-logo">🎓</div>
            <h1>Student Directory</h1>
            <p>Enter password to access</p>
            <form id="auth-form">
                <input type="password" id="password-input" placeholder="Password" required autocomplete="off">
                <button type="submit">Access Directory</button>
                <p id="auth-error" class="error-message"></p>
            </form>
        </div>
    </div>

    <!-- Main Content -->
    <div id="main-content" class="hidden">
        <nav class="navbar">
            <div class="nav-container">
                <div class="nav-brand">
                    <span class="logo">🎓</span>
                    <span class="brand-text">Student Directory</span>
                </div>
                <div class="nav-actions">
                    <span id="student-count" class="student-count"></span>
                    <button id="logout-btn" class="logout-btn">🔒 Logout</button>
                </div>
            </div>
        </nav>

        <div class="container">
            <div class="search-container">
                <div class="search-box">
                    <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>
                    <input type="text" id="search" placeholder="Search by name or email...">
                </div>

                <div class="controls">
                    <select id="gender-filter" aria-label="Filter by gender">
                        <option value="all">All genders</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                    </select>

                    <select id="sort-select" aria-label="Sort students">
                        <option value="name-asc">Name A–Z</option>
                        <option value="name-desc">Name Z–A</option>
                    </select>
                    <!-- batch filter removed (batch currently empty). -->
                </div>
            </div>

            <div id="student-grid" class="student-grid"></div>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <button class="close">&times;</button>
            <div class="modal-header">
                <img id="modal-photo" src="" alt="Student Photo">
            </div>
            <div class="modal-body">
                <h2 id="modal-name"></h2>
                <div class="modal-info">
                    <svg class="info-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                        <polyline points="22,6 12,13 2,6"></polyline>
                    </svg>
                    <p id="modal-email"></p>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
