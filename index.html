<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Directory | SVYASA</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Password Protection Screen -->
    <div id="auth-screen" class="auth-screen">
        <div class="auth-background">
            <div class="glow-orb orb-1"></div>
            <div class="glow-orb orb-2"></div>
            <div class="glow-orb orb-3"></div>
        </div>
        <div class="auth-container">
            <div class="auth-logo">🎓</div>
            <h1>Student Directory</h1>
            <p class="auth-subtitle">Access the complete student portal</p>
            <form id="auth-form" class="auth-form">
                <div class="input-wrapper">
                    <input type="password" id="password-input" placeholder="Enter password" required autocomplete="off">
                    <svg class="lock-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                </div>
                <button type="submit" class="auth-button">
                    <span>Access Directory</span>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </button>
                <p id="auth-error" class="error-message"></p>
            </form>
        </div>
    </div>

    <!-- Main Content -->
    <div id="main-content" class="hidden">
        <nav class="navbar">
            <div class="nav-container">
                <div class="nav-brand">
                    <span class="logo">🎓</span>
                    <span class="brand-text">Student Directory</span>
                    <span class="nav-badge">SVYASA</span>
                </div>
                <div class="nav-actions">
                    <span id="student-count" class="student-count">0 Students</span>
                    <button id="logout-btn" class="logout-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M19 12H5M12 19l-7-7 7-7"/>
                        </svg>
                        Logout
                    </button>
                </div>
            </div>
        </nav>

        <div class="container">
            <div class="search-section">
                <h2 class="section-title">Find Students</h2>
                <div class="search-container">
                    <div class="search-box">
                        <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.35-4.35"></path>
                        </svg>
                        <input type="text" id="search" placeholder="Search by name, email, GitHub, USN...">
                        <button class="search-clear" id="search-clear" type="button" style="display: none;">✕</button>
                    </div>

                    <div class="controls">
                        <div class="filter-group">
                            <select id="gender-filter" class="filter-select" aria-label="Filter by gender">
                                <option value="all">👥 All Genders</option>
                                <option value="male">👨 Male</option>
                                <option value="female">👩 Female</option>
                            </select>
                        </div>

                        <div class="filter-group">
                            <select id="batch-filter" class="filter-select" aria-label="Filter by batch">
                                <option value="all">📚 All Batches</option>
                                <option value="Batch 1">Batch 1</option>
                                <option value="Batch 2">Batch 2</option>
                            </select>
                        </div>

                        <div class="filter-group">
                            <select id="sort-select" class="filter-select" aria-label="Sort students">
                                <option value="name-asc">↑ Name A–Z</option>
                                <option value="name-desc">↓ Name Z–A</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <div id="student-grid" class="student-grid"></div>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <button class="close-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
            <div class="modal-header">
                <img id="modal-photo" src="" alt="Student Photo" class="modal-photo">
            </div>
            <div class="modal-body">
                <div class="modal-header-info">
                    <h2 id="modal-name" class="modal-name"></h2>
                    <div class="modal-badges">
                        <span id="modal-batch-badge" class="badge batch-badge"></span>
                    </div>
                </div>

                <div class="modal-details">
                    <div class="detail-item">
                        <svg class="detail-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                            <polyline points="22,6 12,13 2,6"></polyline>
                        </svg>
                        <div>
                            <p class="detail-label">Email</p>
                            <p id="modal-email" class="detail-value"></p>
                        </div>
                    </div>

                    <div class="detail-item">
                        <svg class="detail-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                            <polyline points="9 22 9 12 15 12 15 22"></polyline>
                        </svg>
                        <div>
                            <p class="detail-label">Institutional Email</p>
                            <p id="modal-institutional-email" class="detail-value"></p>
                        </div>
                    </div>

                    <div class="detail-item">
                        <svg class="detail-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="4" width="18" height="16" rx="2" ry="2"></rect>
                            <circle cx="9" cy="10" r="2"></circle>
                            <path d="M15 8h2"></path>
                            <path d="M15 12h2"></path>
                            <path d="M7 16h10"></path>
                        </svg>
                        <div>
                            <p class="detail-label">USN</p>
                            <p id="modal-usn" class="detail-value"></p>
                        </div>
                    </div>

                    <div class="detail-item">
                        <svg class="detail-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                        <div>
                            <p class="detail-label">Gender</p>
                            <p id="modal-gender" class="detail-value"></p>
                        </div>
                    </div>
                </div>

                <div class="modal-social">
                    <div id="modal-github-container" style="display: none;">
                        <a id="modal-github" href="" target="_blank" rel="noopener noreferrer" class="social-link github-link">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                            </svg>
                            <span>GitHub</span>
                        </a>
                    </div>
                    <div id="modal-linkedin-container" style="display: none;">
                        <a id="modal-linkedin" href="" target="_blank" rel="noopener noreferrer" class="social-link linkedin-link">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
                            </svg>
                            <span>LinkedIn</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
