<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal | NST Bangalore</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        /* ============================================================
           ADMIN PORTAL — REFINED UI
           Built on the shared design system in style.css.
           All element IDs & JS-injected class names are preserved.
           ============================================================ */

        :root {
            --admin-max: 1240px;
        }

        /* ---------- Dashboard shell ---------- */
        #dashboard-section.profile-section {
            max-width: var(--admin-max);
            padding-top: var(--spacing-lg);
        }

        #dashboard-section .card-content {
            padding: clamp(1.25rem, 2vw, 2rem);
        }

        /* ---------- Top bar ---------- */
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: var(--spacing-md);
            padding-bottom: var(--spacing-lg);
            margin-bottom: var(--spacing-xl);
            border-bottom: 1px solid var(--border-color);
            flex-wrap: wrap;
        }

        .dashboard-title {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .dashboard-title .title-badge {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: var(--gradient-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            box-shadow: 0 8px 22px rgba(139, 92, 246, 0.35);
            flex-shrink: 0;
        }

        .dashboard-title h2 {
            font-family: 'Outfit', sans-serif;
            font-size: clamp(1.35rem, 2.5vw, 1.75rem);
            font-weight: 800;
            line-height: 1.1;
            color: var(--text-primary);
        }

        .dashboard-title .subtitle {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .logout-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-card);
            color: var(--error);
            padding: 9px 18px;
            border-radius: var(--radius-full);
            border: 1px solid rgba(239, 68, 68, 0.3);
            cursor: pointer;
            font-weight: 600;
            font-family: inherit;
            font-size: 0.9rem;
            transition: all var(--transition-fast);
        }

        .logout-btn:hover {
            background: var(--error);
            color: #fff;
            border-color: var(--error);
            box-shadow: 0 6px 18px rgba(239, 68, 68, 0.3);
            transform: translateY(-1px);
        }

        /* ---------- Overview: stats + blood groups ---------- */
        .dashboard-overview {
            margin-bottom: 26px;
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 14px;
        }

        .dashboard-overview .stats-bar {
            margin-bottom: 0;
        }

        .stat-card {
            position: relative;
            background: var(--bg-card);
            padding: 18px 16px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            text-align: left;
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            transition: transform var(--transition-fast), box-shadow var(--transition-fast);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            inset: 0 auto 0 0;
            width: 4px;
            background: var(--gradient-primary);
            opacity: 0.9;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-md);
        }

        .stat-value {
            font-family: 'Outfit', sans-serif;
            font-size: 1.9rem;
            font-weight: 800;
            color: var(--primary-600);
            line-height: 1;
            margin-bottom: 6px;
        }

        .stat-label {
            font-size: 0.78rem;
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        /* Premium Blood Group Panel Styling */
        .blood-group-panel {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 20px;
            box-shadow: var(--shadow-sm);
            transition: all var(--transition-normal);
        }

        .blood-group-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .blood-group-header-text h3 {
            margin: 0;
            font-size: 1.05rem;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            color: var(--text-primary);
        }

        .blood-group-header-text p {
            margin: 2px 0 0;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .blood-group-toggle {
            display: inline-flex;
            background: var(--gray-100);
            padding: 3px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
        }

        .view-toggle-btn {
            background: transparent;
            border: none;
            padding: 6px;
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-fast);
        }

        .view-toggle-btn.active {
            background: white;
            color: var(--primary-600);
            box-shadow: var(--shadow-sm);
        }

        /* Grid View Layout */
        .blood-group-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .blood-group-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 12px 8px;
            text-align: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all var(--transition-fast);
        }

        .blood-group-card.has-data {
            border-color: rgba(139, 92, 246, 0.15);
            background: linear-gradient(180deg, var(--bg-card) 0%, rgba(245, 243, 255, 0.2) 100%);
        }

        .blood-group-card.has-data:hover {
            border-color: var(--primary-400);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(139, 92, 246, 0.12);
        }

        .blood-group-card.empty-data {
            opacity: 0.65;
        }

        .blood-group-card.empty-data:hover {
            border-color: var(--border-color);
            background: var(--gray-50);
        }

        .blood-group-card-bg-droplet {
            position: absolute;
            right: -6px;
            bottom: -6px;
            color: rgba(239, 68, 68, 0.05);
            pointer-events: none;
            transition: color var(--transition-fast);
        }

        .blood-group-card.has-data:hover .blood-group-card-bg-droplet {
            color: rgba(239, 68, 68, 0.12);
        }

        .blood-group-card-value {
            display: block;
            font-family: 'Outfit', sans-serif;
            font-size: 1.35rem;
            font-weight: 800;
            color: var(--text-primary);
            line-height: 1;
        }

        .blood-group-card.has-data .blood-group-card-value {
            color: var(--primary-600);
        }

        .blood-group-card-label {
            display: block;
            margin-top: 4px;
            font-size: 0.76rem;
            color: var(--text-secondary);
            font-weight: 700;
        }

        /* Distribution Chart View Layout */
        .blood-group-chart {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 4px 0;
        }

        .chart-row {
            display: flex;
            flex-direction: column;
            gap: 4px;
            cursor: pointer;
            padding: 6px 8px;
            border-radius: var(--radius-md);
            border: 1px solid transparent;
            transition: all var(--transition-fast);
        }

        .chart-row:hover {
            background: var(--gray-50);
            border-color: var(--border-color);
        }

        .chart-row-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.82rem;
            font-weight: 700;
        }

        .chart-row-label {
            color: var(--text-primary);
        }

        .chart-row-count {
            color: var(--primary-600);
        }

        .chart-row-bar-container {
            height: 8px;
            background: var(--gray-100);
            border-radius: var(--radius-full);
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .chart-row-bar-fill {
            height: 100%;
            background: var(--gradient-primary);
            border-radius: var(--radius-full);
            width: 0%;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Modal Directory List Styles */
        .modal-directory-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 0 0 16px;
            font-family: 'Outfit', sans-serif;
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--text-primary);
        }

        .modal-directory-title svg {
            color: #ef4444; /* red drop */
            flex-shrink: 0;
        }

        .modal-directory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 12px;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 4px;
            scrollbar-width: thin;
        }

        .modal-directory-card {
            background: var(--gray-50);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 12px 10px;
            text-align: center;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .modal-directory-card:hover {
            border-color: var(--primary-400);
            background: white;
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
        }

        .modal-directory-photo {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--primary-100);
            margin: 0 auto 8px;
            display: block;
        }

        .modal-directory-name {
            font-size: 0.82rem;
            font-weight: 700;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 2px;
        }

        .modal-directory-usn {
            font-size: 0.72rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* ---------- Controls bar ---------- */
        .controls-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 26px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-field {
            position: relative;
            flex: 1;
            min-width: 220px;
        }

        .search-field svg {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
        }

        .search-input {
            width: 100%;
            padding: 12px 16px 12px 42px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            background: var(--bg-input);
            font-family: inherit;
            font-size: 0.95rem;
            color: var(--text-primary);
            outline: none;
            transition: all var(--transition-normal);
        }

        .search-input:focus {
            border-color: var(--primary-500);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.1);
        }

        .sort-select {
            padding: 12px 14px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            background: var(--bg-input);
            font-family: inherit;
            font-size: 0.9rem;
            color: var(--text-primary);
            outline: none;
            cursor: pointer;
            transition: all var(--transition-normal);
        }

        .sort-select:focus {
            border-color: var(--primary-500);
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.1);
        }

        .action-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 11px 18px;
            border-radius: var(--radius-md);
            border: 1px solid var(--primary-500);
            background: var(--gradient-primary);
            color: #fff;
            font-family: inherit;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all var(--transition-fast);
            white-space: nowrap;
        }

        .action-btn.secondary {
            background: var(--bg-card);
            color: var(--primary-600);
            border-color: var(--primary-200);
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(139, 92, 246, 0.28);
        }

        .action-btn.secondary:hover {
            background: var(--primary-50);
            border-color: var(--primary-400);
        }

        .action-btn:active {
            transform: translateY(0);
        }

        /* ---------- Birthdays ---------- */
        .birthdays-section {
            margin-bottom: 30px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.7), rgba(245, 243, 255, 0.6));
            padding: 18px 20px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--primary-200);
        }

        .birthdays-section h3 {
            margin: 0 0 14px;
            color: var(--primary-700);
            font-family: 'Outfit', sans-serif;
            font-size: 1.05rem;
            font-weight: 700;
        }

        .birthdays-grid {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 8px;
            scrollbar-width: thin;
        }

        .birthday-card {
            background: var(--bg-card);
            padding: 14px 12px;
            border-radius: var(--radius-md);
            min-width: 148px;
            border: 1px solid var(--border-color);
            text-align: center;
            box-shadow: var(--shadow-sm);
            transition: all var(--transition-fast);
        }

        .birthday-card:hover {
            transform: translateY(-3px);
            border-color: var(--primary-300);
            box-shadow: var(--shadow-md);
        }

        /* ---------- Section heading + count ---------- */
        .grid-heading {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .grid-heading h3 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .count-chip {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--primary-700);
            background: var(--primary-50);
            border: 1px solid var(--primary-100);
            padding: 4px 12px;
            border-radius: var(--radius-full);
        }

        /* ---------- Student grid & cards ---------- */
        .admin-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(288px, 1fr));
            gap: 16px;
        }

        .student-card {
            position: relative;
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 18px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 14px;
            transition: transform var(--transition-fast), box-shadow var(--transition-fast), border-color var(--transition-fast);
        }

        .student-card::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            box-shadow: inset 0 0 0 1.5px transparent;
            transition: box-shadow var(--transition-fast);
            pointer-events: none;
        }

        .student-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
            border-color: var(--primary-200);
        }

        .student-card:hover::after {
            box-shadow: inset 0 0 0 1.5px var(--primary-300);
        }

        .mini-photo {
            width: 58px;
            height: 58px;
            border-radius: 50%;
            object-fit: cover;
            background: var(--primary-100);
            border: 2px solid var(--primary-100);
            flex-shrink: 0;
        }

        .student-info {
            min-width: 0;
            flex: 1;
        }

        .student-info h4 {
            margin: 0;
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
            font-size: 1.05rem;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .student-info p {
            margin: 3px 0 0;
            color: var(--text-secondary);
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 0.02em;
        }

        /* ---------- Modal ---------- */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(24, 24, 27, 0.55);
            backdrop-filter: blur(6px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: var(--spacing-md);
            animation: fadeIn 0.2s ease;
        }

        .modal-content {
            background: var(--bg-card);
            padding: 32px;
            border-radius: var(--radius-xl);
            width: 100%;
            max-width: 480px;
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow-xl);
            animation: modalPop 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes modalPop {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(10px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .close-modal {
            position: absolute;
            top: 16px;
            right: 18px;
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            line-height: 1;
            cursor: pointer;
            color: var(--text-secondary);
            background: var(--gray-100);
            border-radius: 50%;
            transition: all var(--transition-fast);
        }

        .close-modal:hover {
            background: var(--error-light);
            color: var(--error);
        }

        .modal-profile-header {
            text-align: center;
            margin-bottom: 22px;
        }

        .modal-photo {
            width: 104px;
            height: 104px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--primary-100);
            box-shadow: 0 8px 24px rgba(139, 92, 246, 0.2);
        }

        .modal-detail-row {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .modal-label {
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.9rem;
        }

        .modal-value {
            color: var(--text-primary);
            font-weight: 600;
            text-align: right;
            overflow-wrap: break-word;
        }

        /* ---------- Responsive ---------- */
        @media (max-width: 1200px) {
            .stats-bar {
                grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            }
        }

        @media (max-width: 980px) {
            .dashboard-overview {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 600px) {
            .dashboard-header {
                align-items: flex-start;
            }

            .stat-value {
                font-size: 1.5rem;
            }

            .controls-bar {
                gap: 10px;
            }

            .action-btn {
                flex: 1;
                justify-content: center;
            }

            .modal-content {
                padding: 22px;
            }
        }
    </style>
</head>

<body>
    <div class="bg-animation">
        <div class="mesh-gradient"></div>
        <div class="floating-shapes">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
        </div>
        <div class="grid-pattern"></div>
    </div>

    <div class="app-container">
        <!-- ===== Login ===== -->
        <div id="login-section" class="search-section">
            <div class="search-card glass-card">
                <div class="card-glow"></div>
                <div class="card-content">
                    <div class="search-header">
                        <div class="icon-circle">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                            </svg>
                        </div>
                        <h2>Admin Portal</h2>
                        <p>Secure access for administrators</p>
                    </div>

                    <div id="otp-request-view">
                        <button id="send-otp-btn" class="search-btn" style="width: 100%">
                            Send Verification Code
                        </button>
                    </div>

                    <div id="otp-verify-view" class="hidden">
                        <div class="otp-input-group">
                            <input type="text" id="admin-otp" placeholder="Enter 6-digit OTP" maxlength="6"
                                inputmode="numeric" autocomplete="one-time-code" aria-label="One-time verification code"
                                style="text-align: center; letter-spacing: 5px; font-size: 1.5rem;">
                        </div>
                        <button id="verify-otp-btn" class="verify-btn">Verify Access</button>
                        <button id="back-to-send" class="resend-link">Go Back</button>
                    </div>

                    <div id="message-box" class="error-message hidden">
                        <span></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- ===== Dashboard ===== -->
        <div id="dashboard-section" class="profile-section hidden">
            <div class="glass-card">
                <div class="card-glow"></div>
                <div class="card-content">
                    <!-- Top bar -->
                    <div class="dashboard-header">
                        <div class="dashboard-title">
                            <div class="title-badge">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                                    <circle cx="9" cy="7" r="4"></circle>
                                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                                    <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                                </svg>
                            </div>
                            <div>
                                <h2>Student Directory</h2>
                                <span class="subtitle">NST Bangalore · Admin Dashboard</span>
                            </div>
                        </div>
                        <button id="logout-btn" class="logout-btn">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                                <polyline points="16 17 21 12 16 7"></polyline>
                                <line x1="21" y1="12" x2="9" y2="12"></line>
                            </svg>
                            Logout
                        </button>
                    </div>

                    <!-- Stats overview -->
                    <div class="dashboard-overview">
                        <div id="stats-bar" class="stats-bar hidden"></div>
                    </div>

                    <!-- Controls -->
                    <div class="controls-bar">
                        <div class="search-field">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="11" cy="11" r="8"></circle>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                            </svg>
                            <input type="text" id="search-input" placeholder="Search by name or USN..."
                                class="search-input" aria-label="Search by name or USN">
                        </div>
                        <select id="sort-select" class="sort-select" aria-label="Sort options">
                            <option value="name">Sort by Name</option>
                            <option value="usn">Sort by USN</option>
                            <option value="batch">Sort by Batch</option>
                        </select>
                        <select id="gender-filter" class="sort-select" aria-label="Filter by Gender">
                            <option value="all">All Genders</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                        </select>
                        <select id="batch-filter" class="sort-select" aria-label="Filter by Batch">
                            <option value="all">All Batches</option>
                            <option value="batch 1">Batch 1</option>
                            <option value="batch 2">Batch 2</option>
                        </select>
                        <button id="birthday-btn" class="action-btn secondary" title="Show Upcoming Birthdays">
                            🎂 Birthdays
                        </button>
                        <button id="blood-stats-btn" class="action-btn secondary" title="Show Blood Group Distribution">
                            🩸 Blood Stats
                        </button>
                        <button id="refresh-btn" class="action-btn" title="Refresh Data">
                            🔄 Refresh
                        </button>
                    </div>

                    <!-- Upcoming birthdays -->
                    <div id="birthdays-section" class="birthdays-section hidden">
                        <h3>🎂 Upcoming Birthdays</h3>
                        <div id="birthdays-grid" class="birthdays-grid"></div>
                    </div>

                    <!-- Blood Group Distribution -->
                    <div id="blood-group-section" class="birthdays-section hidden" style="margin-bottom: 30px;">
                        <div id="blood-group-stats" class="blood-group-panel"></div>
                    </div>

                    <!-- Directory -->
                    <div class="grid-heading">
                        <h3>All Students</h3>
                        <span id="student-count" class="count-chip hidden">0</span>
                    </div>
                    <div id="students-grid" class="admin-grid">
                        <!-- Student cards injected here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== Student details modal ===== -->
    <div id="student-modal" class="modal hidden">
        <div class="modal-content glass-card">
            <span class="close-modal">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>

</html>
