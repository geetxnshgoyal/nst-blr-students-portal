<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal | NST Bangalore</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        .admin-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .student-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 15px;
            transition: transform 0.2s;
        }

        .student-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .mini-photo {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            background: var(--primary-100);
        }

        .student-info h4 {
            margin: 0;
            color: var(--text-primary);
            font-size: 1.1rem;
        }

        .student-info p {
            margin: 2px 0 0;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .logout-btn {
            background: var(--error);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="bg-animation">
        <div class="mesh-gradient"></div>
        <div class="floating-shapes">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
        </div>
        <div class="grid-pattern"></div>
    </div>

    <div class="app-container">
        <!-- Login Section -->
        <div id="login-section" class="search-section">
            <div class="search-card glass-card">
                <div class="card-glow"></div>
                <div class="card-content">
                    <div class="search-header">
                        <div class="icon-circle">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
                            </svg>
                        </div>
                        <h2>Admin Portal</h2>
                        <p>Secure Access for Administrators</p>
                    </div>

                    <div id="otp-request-view">
                        <button id="send-otp-btn" class="search-btn" style="width: 100%">
                            Send Verification Code
                        </button>
                    </div>

                    <div id="otp-verify-view" class="hidden">
                        <div class="otp-input-group">
                            <input type="text" id="admin-otp" placeholder="Enter 6-digit OTP" maxlength="6"
                                style="text-align: center; letter-spacing: 5px; font-size: 1.5rem;">
                        </div>
                        <button id="verify-otp-btn" class="verify-btn">Verify Access</button>
                        <button id="back-to-send" class="resend-link">Go Back</button>
                    </div>

                    <div id="message-box" class="error-message hidden">
                        <span></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Dashboard Section -->
        <div id="dashboard-section" class="profile-section hidden" style="max-width: 1200px">
            <div class="glass-card">
                <div class="card-content">
                    <div class="dashboard-header">
                        <h2>Student Directory</h2>
                        <button id="logout-btn" class="logout-btn">Logout</button>
                    </div>

                    <!-- Stats Bar -->
                    <div id="stats-bar" class="stats-bar hidden"></div>

                    <!-- Controls -->
                    <div class="controls-bar">
                        <input type="text" id="search-input" placeholder="Search by Name or USN..."
                            class="search-input">
                        <select id="sort-select" class="sort-select">
                            <option value="name">Sort by Name</option>
                            <option value="usn">Sort by USN</option>
                            <option value="batch">Sort by Batch</option>
                        </select>
                        <button id="birthday-btn" class="action-btn" title="Show Upcoming Birthdays">
                            🎂 Birthdays
                        </button>
                        <button id="refresh-btn" class="action-btn" title="Refresh Data">
                            🔄 Refresh
                        </button>
                    </div>

                    <!-- Upcoming Birthdays -->
                    <div id="birthdays-section" class="birthdays-section hidden">
                        <h3>🎂 All Upcoming Birthdays (Chronological Order)</h3>
                        <div id="birthdays-grid" class="birthdays-grid"></div>
                    </div>

                    <div id="students-grid" class="admin-grid">
                        <!-- Student cards injected here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Student Details Modal -->
    <div id="student-modal" class="modal hidden">
        <div class="modal-content glass-card">
            <span class="close-modal">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <style>
        /* Extra styles for new features */
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: white;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            text-align: center;
            box-shadow: var(--shadow-sm);
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-600);
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .controls-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .search-input {
            flex: 1;
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            outline: none;
        }

        .sort-select {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            outline: none;
        }

        .action-btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid var(--primary-500);
            background: var(--primary-500);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .action-btn:hover {
            background: var(--primary-600);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .action-btn:active {
            transform: translateY(0);
        }

        .birthdays-section {
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.5);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--primary-200);
        }

        .birthdays-section h3 {
            margin-top: 0;
            color: var(--primary-600);
            font-size: 1.1rem;
            margin-bottom: 10px;
        }

        .birthdays-grid {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .birthday-card {
            background: white;
            padding: 10px;
            border-radius: 8px;
            min-width: 150px;
            border: 1px solid var(--border-color);
            text-align: center;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 16px;
            width: 90%;
            max-width: 500px;
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .modal-profile-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .modal-photo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--primary-100);
        }

        .modal-detail-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .modal-label {
            color: var(--text-secondary);
            font-weight: 500;
        }

        .modal-value {
            color: var(--text-primary);
            font-weight: 600;
            text-align: right;
        }
    </style>

    <script src="admin.js"></script>
</body>

</html>
