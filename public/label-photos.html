<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Labeling Tool - Admin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2rem;
            text-align: center;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 0.9rem;
            text-align: center;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .photo-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .photo-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        .photo-card img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
            border: 4px solid #667eea;
        }

        .photo-number {
            font-size: 0.85rem;
            color: #999;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .photo-card input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.9rem;
            text-align: center;
            transition: all 0.3s;
        }

        .photo-card input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .photo-card input.filled {
            border-color: #28a745;
            background: #f0fff4;
        }

        .submit-container {
            position: sticky;
            bottom: 20px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 -5px 20px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .progress {
            margin-bottom: 15px;
            font-size: 1.1rem;
            color: #667eea;
            font-weight: 600;
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }

        .status.show {
            display: block;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
        }

        .autocomplete-dropdown {
            position: absolute;
            background: white;
            border: 2px solid #667eea;
            border-radius: 8px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 1000;
            width: calc(100% - 30px);
            margin-top: -8px;
            display: none;
        }

        .autocomplete-item {
            padding: 10px;
            cursor: pointer;
            border-bottom: 1px solid #f0f0f0;
        }

        .autocomplete-item:hover {
            background: #f0f4ff;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>📸 Photo Labeling Tool</h1>
        <p class="subtitle">Type the student's name under each photo. Press TAB to move to the next one.</p>

        <div class="grid" id="photoGrid"></div>

        <div class="submit-container">
            <div class="progress" id="progress">0 of 24 photos labeled</div>
            <button id="submitBtn" onclick="submitAll()">Update All Photos</button>
            <div class="status" id="status"></div>
        </div>
    </div>

    <script>
        let students = [];
        let photoData = [];

        async function loadData() {
            try {
                // Load students
                const studentsRes = await fetch('/api/portal/students');
                students = await studentsRes.json();
                students.sort((a, b) => a.name.localeCompare(b.name));

                // Load photo metadata
                const photosRes = await fetch('/temp_photos/photos.json');
                photoData = await photosRes.json();

                renderPhotos();
            } catch (error) {
                alert('Error loading data: ' + error.message);
            }
        }

        function renderPhotos() {
            const grid = document.getElementById('photoGrid');
            grid.innerHTML = '';

            photoData.forEach((photo, index) => {
                const card = document.createElement('div');
                card.className = 'photo-card';
                card.innerHTML = `
                    <div class="photo-number">Photo #${photo.id}</div>
                    <img src="${photo.relativePath}" alt="Photo ${photo.id}">
                    <input 
                        type="text" 
                        id="name_${photo.id}" 
                        placeholder="Type student name"
                        autocomplete="off"
                        oninput="handleInput(${photo.id})"
                        onfocus="showAutocomplete(${photo.id})"
                    >
                    <div class="autocomplete-dropdown" id="dropdown_${photo.id}"></div>
                `;
                grid.appendChild(card);
            });

            updateProgress();
        }

        function handleInput(photoId) {
            const input = document.getElementById(`name_${photoId}`);
            const value = input.value.trim();

            if (value.length > 0) {
                input.classList.add('filled');
                showAutocomplete(photoId);
            } else {
                input.classList.remove('filled');
            }

            updateProgress();
        }

        function showAutocomplete(photoId) {
            const input = document.getElementById(`name_${photoId}`);
            const dropdown = document.getElementById(`dropdown_${photoId}`);
            const value = input.value.toLowerCase();

            if (value.length < 2) {
                dropdown.style.display = 'none';
                return;
            }

            const matches = students.filter(s =>
                s.name.toLowerCase().includes(value)
            ).slice(0, 5);

            if (matches.length === 0) {
                dropdown.style.display = 'none';
                return;
            }

            dropdown.innerHTML = matches.map(s => `
                <div class="autocomplete-item" onclick="selectStudent(${photoId}, '${s.name}', '${s.usn}')">
                    ${s.name} (${s.usn})
                </div>
            `).join('');

            dropdown.style.display = 'block';
        }

        function selectStudent(photoId, name, usn) {
            const input = document.getElementById(`name_${photoId}`);
            input.value = name;
            input.dataset.usn = usn;
            input.classList.add('filled');
            document.getElementById(`dropdown_${photoId}`).style.display = 'none';
            updateProgress();
        }

        function updateProgress() {
            const filled = photoData.filter(p => {
                const input = document.getElementById(`name_${p.id}`);
                return input && input.value.trim().length > 0;
            }).length;

            document.getElementById('progress').textContent =
                `${filled} of ${photoData.length} photos labeled`;
        }

        async function submitAll() {
            const updates = [];

            for (const photo of photoData) {
                const input = document.getElementById(`name_${photo.id}`);
                const name = input.value.trim();

                if (name) {
                    // Find student by name
                    const student = students.find(s =>
                        s.name.toLowerCase() === name.toLowerCase()
                    );

                    if (student) {
                        updates.push({
                            photoId: photo.id,
                            usn: student.usn,
                            name: student.name,
                            url: photo.url
                        });
                    }
                }
            }

            if (updates.length === 0) {
                showStatus('Please label at least one photo', 'error');
                return;
            }

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = `Updating ${updates.length} photos...`;

            try {
                const response = await fetch('/api/admin/batch-upload-photos', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ updates })
                });

                const result = await response.json();

                if (response.ok) {
                    showStatus(`✅ Successfully updated ${result.success} photos!`, 'success');

                    // Clear labeled photos
                    updates.forEach(u => {
                        const input = document.getElementById(`name_${u.photoId}`);
                        input.value = '';
                        input.classList.remove('filled');
                    });

                    updateProgress();
                } else {
                    showStatus('Error: ' + result.error, 'error');
                }
            } catch (error) {
                showStatus('Failed: ' + error.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Update All Photos';
            }
        }

        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = `status show ${type}`;
            setTimeout(() => status.classList.remove('show'), 5000);
        }

        // Close dropdowns when clicking outside
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.photo-card')) {
                document.querySelectorAll('.autocomplete-dropdown').forEach(d => {
                    d.style.display = 'none';
                });
            }
        });

        loadData();
    </script>
</body>

</html>
