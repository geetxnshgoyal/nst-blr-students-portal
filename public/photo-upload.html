<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Upload Tool - Admin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2rem;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #444;
            font-weight: 600;
            font-size: 0.95rem;
        }

        input[type="text"],
        select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        input[type="text"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        select {
            cursor: pointer;
            background: white;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .preview {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            display: none;
        }

        .preview.show {
            display: block;
        }

        .preview img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            margin: 0 auto 15px;
            border: 4px solid #667eea;
        }

        .preview-info {
            text-align: center;
            color: #666;
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }

        .status.show {
            display: block;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .count {
            text-align: center;
            margin-bottom: 30px;
            padding: 15px;
            background: #f0f4ff;
            border-radius: 10px;
            color: #667eea;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>📸 Photo Upload Tool</h1>
        <p class="subtitle">Paste LinkedIn photo URLs and assign to students</p>

        <div class="count" id="count">Loading students...</div>

        <div class="form-group">
            <label for="linkedinUrl">LinkedIn Photo URL</label>
            <input type="text" id="linkedinUrl" placeholder="https://media.licdn.com/dms/image/...">
        </div>

        <div class="form-group">
            <label for="studentSelect">Select Student</label>
            <select id="studentSelect">
                <option value="">-- Choose a student --</option>
            </select>
        </div>

        <div class="preview" id="preview">
            <img id="previewImg" src="" alt="Preview">
            <div class="preview-info" id="previewInfo"></div>
        </div>

        <button id="updateBtn" onclick="updatePhoto()">Update Photo</button>

        <div class="status" id="status"></div>
    </div>

    <script>
        let students = [];

        // Load students without photos
        async function loadStudents() {
            try {
                const response = await fetch('/api/portal/students');
                const allStudents = await response.json();

                // Filter students without photos
                students = allStudents.filter(s =>
                    !s.photo || s.photo.trim().length < 100
                ).sort((a, b) => a.name.localeCompare(b.name));

                const select = document.getElementById('studentSelect');
                students.forEach(student => {
                    const option = document.createElement('option');
                    option.value = student.usn;
                    option.textContent = `${student.name} (${student.usn})`;
                    select.appendChild(option);
                });

                document.getElementById('count').textContent =
                    `${students.length} students need photos`;
            } catch (error) {
                showStatus('Failed to load students: ' + error.message, 'error');
            }
        }

        // Preview photo when URL is pasted
        document.getElementById('linkedinUrl').addEventListener('input', function () {
            const url = this.value.trim();
            const preview = document.getElementById('preview');
            const img = document.getElementById('previewImg');

            if (url && url.includes('linkedin.com')) {
                img.src = url;
                preview.classList.add('show');
            } else {
                preview.classList.remove('show');
            }
        });

        // Update student name in preview when selected
        document.getElementById('studentSelect').addEventListener('change', function () {
            const usn = this.value;
            const student = students.find(s => s.usn === usn);
            const info = document.getElementById('previewInfo');

            if (student) {
                info.textContent = `Will update: ${student.name}`;
            } else {
                info.textContent = '';
            }
        });

        async function updatePhoto() {
            const url = document.getElementById('linkedinUrl').value.trim();
            const usn = document.getElementById('studentSelect').value;
            const btn = document.getElementById('updateBtn');

            if (!url) {
                showStatus('Please paste a LinkedIn photo URL', 'error');
                return;
            }

            if (!usn) {
                showStatus('Please select a student', 'error');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Downloading & Processing...';

            try {
                const response = await fetch('/api/admin/upload-linkedin-photo', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, usn })
                });

                const result = await response.json();

                if (response.ok) {
                    showStatus(`✅ Successfully updated ${result.studentName}!`, 'success');

                    // Remove from students list and reload
                    students = students.filter(s => s.usn !== usn);
                    document.getElementById('count').textContent =
                        `${students.length} students need photos`;

                    // Clear form
                    document.getElementById('linkedinUrl').value = '';
                    document.getElementById('studentSelect').value = '';
                    document.getElementById('preview').classList.remove('show');

                    // Reload students
                    loadStudents();
                } else {
                    showStatus('Error: ' + result.error, 'error');
                }
            } catch (error) {
                showStatus('Failed to update: ' + error.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Update Photo';
            }
        }

        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = `status show ${type}`;
            setTimeout(() => status.classList.remove('show'), 5000);
        }

        // Load students on page load
        loadStudents();
    </script>
</body>

</html>
